version: 2.1

orbs:
  aws-cli: circleci/aws-cli@5.1.0

jobs:
  deploy_on_main:
    docker:
      - image: cimg/python:3.10

    working_directory: ~/project

    steps:
      - checkout

      - run:
          name: Install system packages
          command: |
            sudo apt-get update
            sudo apt-get install -y unzip curl

      - run:
          name: Install Terraform
          command: |
            curl -fsSL https://releases.hashicorp.com/terraform/1.14.0/terraform_1.14.0_linux_amd64.zip -o terraform.zip
            unzip -o terraform.zip
            sudo mv terraform /usr/local/bin/terraform
            terraform version

      - run:
          name: Install AWS SAM CLI
          command: |
            curl -Lo aws-sam-cli-linux-x86_64.zip https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip
            unzip -o aws-sam-cli-linux-x86_64.zip -d sam-installation
            sudo ./sam-installation/install --update
            sam --version

      - run:
          name: Install Lambda dependencies
          command: |
            python -m pip install --upgrade pip
            if [ -f server_less/src/requirements.txt ]; then
              pip install -r server_less/src/requirements.txt
            fi

      - aws-cli/setup:
          profile_name: default
          role_arn: ${AWS_ROLE_ARN}
          region: ${AWS_REGION}

      - run:
          name: Validate and build SAM
          command: |
            cd server_less
            sam validate
            sam build

      - run:
          name: Deploy SAM stack
          command: |
            cd server_less
            sam deploy \
              --stack-name "${SAM_STACK_NAME}" \
              --region "${AWS_REGION}" \
              --capabilities CAPABILITY_NAMED_IAM \
              --resolve-s3 \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset \
              --parameter-overrides \
                ProjectName="${PROJECT_NAME}" \
                GitHubOwner="${GITHUB_OWNER}" \
                GitHubRepo="${GITHUB_REPO}" \
                GitHubBaseBranch="${GITHUB_BASE_BRANCH}" \
                GitHubTokenParameterName="${GITHUB_TOKEN_PARAMETER_NAME}" \
                TerraformRootPath="${TERRAFORM_ROOT_PATH}"

      - run:
          name: Terraform init and apply
          command: |
            cd IaC_Code/root
            terraform init
            terraform apply -auto-approve

workflows:
  deploy_main_only:
    jobs:
      - deploy_on_main:
          filters:
            branches:
              only: main